<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim Analis Emas - Financial Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-900">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col justify-between h-full flex-shrink-0 relative">
        <div>
            <!-- Branding -->
            <div class="px-8 pt-10 pb-8">
                <h1 class="text-xl font-bold text-black mb-1">Tim Analis Emas</h1>
                <p class="text-[10px] text-slate-400 font-medium tracking-widest uppercase">FINANCIAL TERMINAL</p>
            </div>

            <!-- Navigation -->
            <nav class="flex flex-col space-y-2 mt-4 relative">
                <!-- Active Link (Dashboard) -->
                <a href="index.html" class="flex items-center px-8 py-3 text-black font-semibold bg-slate-50 relative">
                    <i class="fa-solid fa-border-all w-6 text-lg"></i>
                    <span class="text-sm">Dashboard</span>
                    <!-- Black right border indicator -->
                    <div class="absolute right-0 top-0 bottom-0 w-1 bg-black"></div>
                </a>
                
                <a href="#" class="flex items-center px-8 py-3 text-slate-500 hover:text-black hover:bg-slate-50 transition-colors">
                    <i class="fa-solid fa-chart-line w-6 text-lg"></i>
                    <span class="text-sm font-medium">Market</span>
                </a>
                <a href="#" class="flex items-center px-8 py-3 text-slate-500 hover:text-black hover:bg-slate-50 transition-colors">
                    <i class="fa-solid fa-chart-simple w-6 text-lg"></i>
                    <span class="text-sm font-medium">Insights</span>
                </a>
                
                <!-- Inactive Link (About Us) -->
                <a href="about.html" class="flex items-center px-8 py-3 text-slate-500 hover:text-black hover:bg-slate-50 transition-colors">
                    <i class="fa-regular fa-circle-info w-6 text-lg"></i>
                    <span class="text-sm font-medium">About Us</span>
                </a>

                <a href="#" class="flex items-center px-8 py-3 text-slate-500 hover:text-black hover:bg-slate-50 transition-colors">
                    <i class="fa-solid fa-gear w-6 text-lg"></i>
                    <span class="text-sm font-medium">Settings</span>
                </a>
            </nav>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <!-- Ticker Tape -->
        <div class="h-12 border-b border-slate-200 bg-white shrink-0">
            <div class="tradingview-widget-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
                {
                    "symbols":[
                        {"proName": "IDX:COMPOSITE", "title": "IDX Composite"},
                        {"proName": "OANDA:XAUUSD", "title": "Gold"},
                        {"proName": "OANDA:XAGUSD", "title": "Silver"},
                        {"proName": "OANDA:USOIL", "title": "Crude Oil"}
                    ],
                    "showSymbolLogo": true, "colorTheme": "light", "isTransparent": true, "displayMode": "adaptive", "locale": "en"
                }
                </script>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-10">
            <div class="max-w-7xl mx-auto space-y-6">
                
                <!-- ROW 1: Chart XAU/USD -->
                <div class="bg-white p-6 rounded-xl border border-slate-200 h-[450px]">
                    <h2 class="text-[11px] font-bold text-slate-500 uppercase mb-4">XAU/USD - GOLD SPOT PRICE (LIVE)</h2>
                    <div class="tradingview-widget-container" style="height:90%">
                        <div id="tv-chart" style="height:100%"></div>
                        <script src="https://s3.tradingview.com/tv.js"></script>
                        <script>
                            new TradingView.widget({"autosize":true,"symbol":"OANDA:XAUUSD","interval":"D","timezone":"Asia/Jakarta","theme":"light","container_id":"tv-chart"});
                        </script>
                    </div>
                </div>

                <!-- ROW 2: Market Overview & Calendar -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-xl border border-slate-200">
                        <h2 class="text-[11px] font-bold text-slate-500 uppercase mb-4">ASSET PERFORMANCE OVERVIEW</h2>
                        <div class="tradingview-widget-container">
                            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                            {
                                "colorTheme": "light",
                                "dateRange": "12M",
                                "showChart": true,
                                "locale": "en",
                                "width": "100%",
                                "height": "400",
                                "tabs":[ { "title": "Market", "symbols":[ { "s": "IDX:COMPOSITE" }, { "s": "OANDA:XAUUSD" }, { "s": "OANDA:XAGUSD" }, { "s": "OANDA:USOIL" } ] } ]
                            }
                            </script>
                        </div>
                    </div>
                    
                    <div class="bg-white p-6 rounded-xl border border-slate-200">
                        <h2 class="text-[11px] font-bold text-slate-500 uppercase mb-4">ECONOMIC CALENDAR</h2>
                        <div class="tradingview-widget-container">
                            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                            {
                                "width": "100%",
                                "height": "400",
                                "colorTheme": "light",
                                "importanceFin": "0,1",
                                "locale": "en"
                            }
                            </script>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
