<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim Analis Emas - Financial Terminal</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-900">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col justify-between h-full flex-shrink-0">
        <div>
            <div class="px-8 pt-10 pb-8">
                <h1 class="text-xl font-bold text-black mb-1">Tim Analis Emas</h1>
                <p class="text-[10px] text-slate-400 font-medium tracking-widest uppercase">FINANCIAL TERMINAL</p>
            </div>

            <nav class="flex flex-col space-y-2 mt-4">
                <a href="#" class="flex items-center px-8 py-3 text-black font-semibold bg-slate-50 relative border-r-4 border-black">
                    <i class="fa-solid fa-border-all w-6 text-lg"></i>
                    <span class="text-sm">Dashboard</span>
                </a>
                <a href="#" class="flex items-center px-8 py-3 text-slate-500 hover:text-black hover:bg-slate-50 transition-colors">
                    <i class="fa-solid fa-chart-line w-6 text-lg"></i>
                    <span class="text-sm font-medium">Market</span>
                </a>
                <a href="#" class="flex items-center px-8 py-3 text-slate-500 hover:text-black hover:bg-slate-50 transition-colors">
                    <i class="fa-solid fa-chart-simple w-6 text-lg"></i>
                    <span class="text-sm font-medium">Insights</span>
                </a>
                <a href="about.html" class="flex items-center px-8 py-3 text-slate-500 hover:text-black hover:bg-slate-50 transition-colors">
                    <i class="fa-regular fa-circle-info w-6 text-lg"></i>
                    <span class="text-sm font-medium">About Us</span>
                </a>
                <a href="#" class="flex items-center px-8 py-3 text-slate-500 hover:text-black hover:bg-slate-50 transition-colors">
                    <i class="fa-solid fa-gear w-6 text-lg"></i>
                    <span class="text-sm font-medium">Settings</span>
                </a>
            </nav>
        </div>

        <div class="px-6 pb-6">
            <div class="bg-[#f1f5f9] rounded-xl p-3 flex items-center space-x-3">
                <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&q=80&w=150" alt="Alex Graham" class="w-10 h-10 rounded-full object-cover">
                <div>
                    <h4 class="text-sm font-bold text-black">Alex Graham</h4>
                    <p class="text-[10px] text-slate-500 font-medium">Tier: Institutional</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        
        <header class="flex items-center justify-between px-10 py-5 bg-white border-b border-slate-200">
            <div class="relative w-[400px]">
                <i class="fa-solid fa-magnifying-glass absolute left-0 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" placeholder="Search tickers, news, or reports..." class="w-full pl-8 pr-4 py-2 bg-transparent focus:outline-none text-sm text-slate-700">
            </div>
            <div class="flex items-center space-x-6">
                <button class="text-slate-600 hover:text-black"><i class="fa-regular fa-bell text-xl"></i></button>
                <div class="h-6 border-l border-slate-300"></div>
                <div class="flex items-center space-x-2 text-sm font-bold text-emerald-700">
                    <span>IDX: OPEN</span>
                    <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto px-10 pb-10 pt-8">
            <div class="max-w-6xl mx-auto space-y-6">
                
                <!-- CHART & EQUITY ROW -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- TradingView Chart -->
                    <div class="lg:col-span-2 bg-white rounded-xl border border-slate-200 overflow-hidden h-[400px] flex flex-col">
                        <div class="p-6 pb-2 flex justify-between items-start">
                            <h2 class="text-[11px] font-bold text-slate-500 tracking-widest uppercase">GOLD SPOT PRICE (XAU/USD)</h2>
                        </div>
                        <div class="flex-1 w-full h-full p-4">
                            <div class="tradingview-widget-container" style="height:100%;width:100%">
                                <div id="tradingview_chart" style="height:100%;width:100%"></div>
                                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                                <script type="text/javascript">
                                new TradingView.widget({
                                    "autosize": true,
                                    "symbol": "OANDA:XAUUSD",
                                    "interval": "D",
                                    "timezone": "Asia/Jakarta",
                                    "theme": "light",
                                    "style": "1",
                                    "locale": "en",
                                    "toolbar_bg": "#f1f3f6",
                                    "enable_publishing": false,
                                    "allow_symbol_change": true,
                                    "container_id": "tradingview_chart"
                                });
                                </script>
                            </div>
                        </div>
                    </div>

                    <!-- Total Equity Card -->
                    <div class="bg-white rounded-xl border border-slate-200 p-6 flex flex-col justify-between">
                        <div>
                            <h2 class="text-[11px] font-bold text-slate-500 tracking-widest uppercase mb-4">TOTAL EQUITY VALUE</h2>
                            <div class="text-4xl font-bold text-black mb-2">Rp 1.42B</div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mt-8">
                            <button class="bg-black text-white font-semibold py-2.5 rounded-lg text-sm hover:bg-slate-800">Deposit</button>
                            <button class="bg-white text-black border border-slate-300 font-semibold py-2.5 rounded-lg text-sm hover:bg-slate-50">Withdraw</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
