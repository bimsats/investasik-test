<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim Analis Emas - Financial Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-900">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col justify-between h-full flex-shrink-0">
        <div>
            <div class="px-8 pt-10 pb-8">
                <h1 class="text-xl font-bold text-black">Tim Analis Emas</h1>
                <p class="text-[10px] text-slate-400 font-medium tracking-widest uppercase">FINANCIAL TERMINAL</p>
            </div>
            <nav class="flex flex-col space-y-2 mt-4 px-4">
                <a href="#" class="flex items-center px-4 py-3 bg-slate-50 rounded-lg font-bold">
                    <i class="fa-solid fa-border-all w-6"></i> Dashboard
                </a>
                <a href="#" class="flex items-center px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-lg">
                    <i class="fa-solid fa-chart-line w-6"></i> Market
                </a>
                <a href="about.html" class="flex items-center px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-lg">
                    <i class="fa-regular fa-circle-info w-6"></i> About Us
                </a>
            </nav>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-y-auto p-10">
        <div class="max-w-7xl mx-auto space-y-6">
            
            <!-- ROW 1: Chart & Kurs USD/IDR -->
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <!-- Chart (Lebih Lebar) -->
                <div class="lg:col-span-3 bg-white p-4 rounded-xl border border-slate-200 h-[450px]">
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase mb-4">XAU/USD - GOLD SPOT PRICE</h2>
                    <div class="tradingview-widget-container" style="height:90%">
                        <div id="tv-chart" style="height:100%"></div>
                        <script src="https://s3.tradingview.com/tv.js"></script>
                        <script>
                            new TradingView.widget({"autosize":true,"symbol":"OANDA:XAUUSD","interval":"D","timezone":"Asia/Jakarta","theme":"light","container_id":"tv-chart"});
                        </script>
                    </div>
                </div>

                <!-- Widget Kurs (Posisi Baru) -->
                <div class="bg-white p-6 rounded-xl border border-slate-200 flex flex-col">
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase mb-4">KURS USD/IDR</h2>
                    <div class="tradingview-widget-container">
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
                        {"symbol": "FX_IDC:USDIDR", "width": "100%", "isTransparent": true, "colorTheme": "light"}
                        </script>
                    </div>
                </div>
            </div>

            <!-- ROW 2: Performa Global -->
            <div class="bg-white p-6 rounded-xl border border-slate-200">
                <h2 class="text-[10px] font-bold text-slate-400 uppercase mb-4">PERFORMA MARKET XAU/USD (LIVE)</h2>
                <div class="tradingview-widget-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-forex-cross-rates.js" async>
                    {
                        "width": "100%",
                        "currencies": ["XAU", "USD"],
                        "isTransparent": true,
                        "colorTheme": "light",
                        "locale": "en"
                    }
                    </script>
                </div>
            </div>

            <!-- ROW 3: Economic Calendar -->
            <div class="bg-white p-6 rounded-xl border border-slate-200">
                <h2 class="text-[10px] font-bold text-slate-400 uppercase mb-4">ECONOMIC CALENDAR</h2>
                <div class="tradingview-widget-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                    {
                        "width": "100%",
                        "height": "400",
                        "colorTheme": "light",
                        "importanceFin": "0,1",
                        "locale": "en"
                    }
                    </script>
                </div>
            </div>

        </div>
    </main>
</body>
</html>
